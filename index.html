<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HOMEV | Interactive 3D Presentation</title>
  <meta property="og:title" content="HOMEV | Interactive 3D Presentation" />
<meta property="og:description" content="Explore an interactive 3D spatial presentation directly in your browser." />
<meta property="og:image" content="https://ecoartic.github.io/homev-3dgs-presentation/cover.png" />
<meta property="og:url" content="https://ecoartic.github.io/homev-3dgs-presentation/" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="HOMEV | Interactive 3D Presentation" />
<meta name="twitter:description" content="Explore an interactive 3D spatial presentation directly in your browser." />
<meta name="twitter:image" content="https://ecoartic.github.io/homev-3dgs-presentation/cover.png" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f1ea;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f4f1ea;
    }

    .viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .viewer iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .top-bar {
      position: absolute;
      top: 24px;
      left: 24px;
      right: 24px;
      z-index: 10;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      pointer-events: none;
    }

    .client-logo {
      pointer-events: auto;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .client-logo img {
      display: block;
      max-height: 54px;
      max-width: 190px;
      width: auto;
      object-fit: contain;
    }

    .site-link {
      pointer-events: auto;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      text-decoration: none;
      transition: 0.25s ease;
    }

    .site-link:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.95);
    }

    .site-link svg {
      width: 21px;
      height: 21px;
    }

    .bottom-caption {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 10;
      padding: 14px 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      color: #111;
      text-align: center;
      min-width: 280px;
    }

    .caption-title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .caption-author {
      margin-top: 5px;
      font-size: 11px;
      font-weight: 400;
      color: #555;
      letter-spacing: 0.06em;
    }

    @media (max-width: 700px) {
      .top-bar {
        top: 16px;
        left: 16px;
        right: 16px;
      }

      .client-logo {
        padding: 8px 11px;
        border-radius: 15px;
      }

      .client-logo img {
        max-height: 42px;
        max-width: 135px;
      }

      .site-link {
        width: 40px;
        height: 40px;
      }

      .site-link svg {
        width: 19px;
        height: 19px;
      }

      .bottom-caption {
        bottom: 16px;
        width: calc(100vw - 32px);
        max-width: 360px;
        min-width: unset;
        padding: 12px 16px;
        border-radius: 16px;
      }

      .caption-title {
        font-size: 13px;
      }

      .caption-author {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="viewer">
      <iframe
        title="HOMEV 3DGS Interactive Presentation"
        src="https://www.kiriengine.app/share/3dgsEmbed/2056748396550553600?userId=330636&type=0&bg_theme=bright&auto_spin=1"
        allowfullscreen
        mozallowfullscreen
        webkitallowfullscreen
        allow="autoplay; fullscreen;">
      </iframe>
    </div>

    <div class="top-bar">
      <div class="client-logo">
        <img src="logo.jpg" alt="HOMEV Logo" />
      </div>

      <a
        class="site-link"
        href="https://ais-pre-sbifioisl3jpxdrq5rmdfk-148756291403.europe-west1.run.app/"
        target="_blank"
        rel="noopener"
        aria-label="Open Behrang Mazloumi portfolio website"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M2 12h20"></path>
          <path d="M12 2a15.3 15.3 0 0 1 0 20"></path>
          <path d="M12 2a15.3 15.3 0 0 0 0 20"></path>
        </svg>
      </a>
    </div>

    <div class="bottom-caption">
      <div class="caption-title">Interactive Spatial Presentation</div>
      <div class="caption-author">Behrang Mazloumi</div>
    </div>

  </main>
</body>
</html>
